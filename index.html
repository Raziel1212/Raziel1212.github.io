<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx"
    crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/style.css">
    <title>proyecto con Javascript 1</title>
</head>
<body>
    <article class="container d-flex mx-auto">
        <div class="card">
          <img
            src="assets/img/pc1.png"
            alt="Notebook Gamer Acer black"
          />
          <div class="card-body">
            <p class="card-title">Notebook Gamer Nitro 5</p>
            <p class="h4">$900000</p>
            <p>Ingrese Cantidad: </p>
            <input type="number" min="0" id="inputCant">
            <br>
            <p>Ingrese color: </p>
            <input type="text" id="inputColor">
            <button type="button" class="btn btn-warning mt-3" id="btnCalcular">Calcular</button>
          </div>
        </div>
        <div class="card">
          <div class="card-body">
            <p class="card-title h2 mt-3 mb-4">Detalle</p>
                <p id="cant">Cantidad: 0</p>
                <div class="d-flex">
                    <p id="color" class="me-2">Color:</p>
                    <div id="circle"></div>
                </div>
                <h3 id="totalPrice" class="mt-5">Total: 0</h3>
          </div>
        </div>
      </article>
    <script src="assets/js/index.js"></script>
</body>
</html>
